version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: invoice_db
      POSTGRES_USER: ${POSTGRES_USER:-invoice_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    networks:
      - invoice_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-invoice_user}:${POSTGRES_PASSWORD}@db:5432/invoice_db
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://yourdomain.com}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: "FutureFrontier Technology"
    volumes:
      - pdf_storage_prod:/app/pdfs
    ports:
      - "127.0.0.1:8085:8000" # Changed from 8000 to 8085 to avoid conflicts
    depends_on:
      - db
    networks:
      - invoice_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod # Assumes an Nginx based Dockerfile for built React app
    restart: always
    ports:
      - "127.0.0.1:3085:80" # Changed from 3000 to 3085 to avoid conflicts
    depends_on:
      - backend
    networks:
      - invoice_network

networks:
  invoice_network:
    driver: bridge

volumes:
  pgdata_prod:
  pdf_storage_prod:
